<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DnD Ontology Visualization Dashboard</title>
  <style>
    :root {
      --bg-1: #f2f5ea;
      --bg-2: #d9e5d6;
      --ink: #132018;
      --ink-soft: #35523e;
      --card: #fbfdf8;
      --card-border: #bfd2be;
      --accent: #0f7b6c;
      --accent-2: #c85d2d;
      --warn: #9a2f2f;
      --shadow: 0 16px 36px rgba(19, 32, 24, 0.12);
      --radius: 16px;
      --header-font: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
      --body-font: "Source Sans Pro", "Lucida Sans", "Segoe UI", sans-serif;
      --mono-font: "IBM Plex Mono", "Consolas", monospace;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 8% 12%, rgba(15, 123, 108, 0.2), transparent 38%),
        radial-gradient(circle at 86% 14%, rgba(200, 93, 45, 0.16), transparent 42%),
        linear-gradient(140deg, var(--bg-1), var(--bg-2));
      color: var(--ink);
      font-family: var(--body-font);
    }

    .shell {
      max-width: 1440px;
      margin: 0 auto;
      padding: 20px 20px 28px;
      animation: enter 500ms ease-out;
    }

    .hero {
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: var(--radius);
      background: linear-gradient(120deg, rgba(251, 253, 248, 0.94), rgba(250, 251, 245, 0.9));
      box-shadow: var(--shadow);
      padding: 18px 18px 14px;
      backdrop-filter: blur(4px);
    }

    h1 {
      margin: 0;
      font-family: var(--header-font);
      font-size: clamp(1.2rem, 1rem + 1.1vw, 2rem);
      letter-spacing: 0.01em;
      line-height: 1.2;
      text-transform: uppercase;
    }

    .subtitle {
      margin: 8px 0 12px;
      color: var(--ink-soft);
      max-width: 86ch;
      line-height: 1.4;
      font-size: 0.96rem;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 9px 14px;
      font: 600 0.89rem var(--body-font);
      cursor: pointer;
      transition: transform 120ms ease, filter 160ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    button:active {
      transform: translateY(0);
    }

    .btn-primary {
      color: #f8fffb;
      background: linear-gradient(130deg, var(--accent), #0c5f54);
    }

    .btn-secondary {
      color: #fffaf6;
      background: linear-gradient(130deg, var(--accent-2), #9e4520);
    }

    .status {
      margin-left: auto;
      padding: 6px 10px;
      border-radius: 999px;
      background: #edf4ee;
      border: 1px solid #c7d7c8;
      color: #264434;
      font: 500 0.8rem var(--mono-font);
      white-space: nowrap;
    }

    .grid {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      border-radius: var(--radius);
      background: var(--card);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: 360px;
      opacity: 0;
      transform: translateY(6px);
      animation: rise 420ms ease forwards;
    }

    .card:nth-child(1) { animation-delay: 90ms; }
    .card:nth-child(2) { animation-delay: 150ms; }
    .card:nth-child(3) { animation-delay: 210ms; }
    .card:nth-child(4) { animation-delay: 270ms; }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 12px 14px 10px;
      border-bottom: 1px solid #dbe7dc;
      background: linear-gradient(180deg, #f7fbf7, #eef6ef);
    }

    .card h2 {
      margin: 0;
      font-size: 0.99rem;
      font-family: var(--header-font);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .chip {
      border-radius: 999px;
      padding: 4px 8px;
      font: 600 0.72rem var(--mono-font);
      border: 1px solid #bdd2c0;
      color: #35533f;
      background: #f3f8f3;
    }

    .panel {
      position: relative;
      flex: 1;
      min-height: 290px;
      background: #ffffff;
      cursor: default;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .panel iframe {
      /* Keep embedded previews lightweight and route click-to-zoom to the panel container. */
      pointer-events: none;
    }

    .card-head-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .zoom-trigger {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: 1px solid #bdd2c0;
      background: rgba(255, 255, 255, 0.85);
      color: #133528;
      display: grid;
      place-items: center;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(19, 53, 40, 0.1);
      transition: transform 130ms ease, background-color 160ms ease, box-shadow 160ms ease;
    }

    .zoom-trigger:hover {
      transform: translateY(-1px) scale(1.05);
      background: #ffffff;
      box-shadow: 0 4px 10px rgba(19, 53, 40, 0.18);
    }

    .zoom-trigger:focus-visible {
      outline: 2px solid #0f7b6c;
      outline-offset: 2px;
    }

    .zoom-trigger svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
      stroke-width: 2;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 14px;
      background:
        linear-gradient(180deg, rgba(249, 252, 246, 0.96), rgba(242, 248, 244, 0.95));
      color: #264434;
      transition: opacity 180ms ease;
      pointer-events: none;
    }

    .overlay.hide {
      opacity: 0;
      pointer-events: none;
    }

    .msg-title {
      margin: 0 0 6px;
      font: 700 0.95rem var(--header-font);
      text-transform: uppercase;
    }

    .msg-body {
      margin: 0;
      color: #3f5a49;
      font-size: 0.86rem;
      line-height: 1.35;
    }

    .msg-body code {
      font-family: var(--mono-font);
      background: #f0f6f0;
      border: 1px solid #cde0cf;
      border-radius: 5px;
      padding: 1px 4px;
      color: #22372a;
    }

    .error .msg-title,
    .error .msg-body {
      color: var(--warn);
    }

    #backdrop {
      position: fixed;
      inset: 0;
      background: rgba(8, 18, 14, 0.52);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 300ms ease;
      z-index: 40;
    }

    #backdrop.visible {
      opacity: 1;
      pointer-events: auto;
      cursor: pointer;
    }

    .card-placeholder {
      border-radius: var(--radius);
      background: rgba(19, 32, 24, 0.04);
      border: 2px dashed #c5d6c6;
    }

    .card.is-zoomed {
      position: fixed !important;
      z-index: 50;
      margin: 0 !important;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.38) !important;
    }

    .card.zoom-animating {
      transition:
        top 320ms cubic-bezier(0.4, 0, 0.2, 1),
        left 320ms cubic-bezier(0.4, 0, 0.2, 1),
        width 320ms cubic-bezier(0.4, 0, 0.2, 1),
        height 320ms cubic-bezier(0.4, 0, 0.2, 1),
        box-shadow 320ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card.is-zoomed .panel iframe {
      pointer-events: auto;
    }

    @media (max-width: 980px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .status {
        margin-left: 0;
      }

      .card {
        min-height: 320px;
      }
    }

    @keyframes enter {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes rise {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1>DnD Ontology Plot Dashboard</h1>
      <p class="subtitle">
        This page composes the four visualization outputs generated by <code>dndonto-viz</code>
        into one view. Keep this file in the same folder as the generated plots.
      </p>
      <div class="toolbar">
        <button id="reload-all" class="btn-primary" type="button">Reload All Panels</button>
        <div id="status" class="status">Initializing...</div>
      </div>
    </section>

    <section id="grid" class="grid" aria-label="Visualization panels"></section>
  </main>

  <div id="backdrop" aria-hidden="true"></div>

  <script>
    const panels = [
      {
        id: "location",
        title: "Location Tree",
        tag: "Hierarchy",
        file: "out/viz/location_tree.html",
      },
      {
        id: "quest",
        title: "Quest Dependency Graph",
        tag: "Network",
        file: "out/viz/quest_graph.html",
      },
      {
        id: "faction",
        title: "Faction Relationship Network",
        tag: "Network",
        file: "out/viz/faction_graph.html",
      },
      {
        id: "delta",
        title: "Reasoning Delta",
        tag: "Summary",
        file: "out/viz/reasoning_delta.html",
      },
    ];

    const statusEl = document.getElementById("status");
    const gridEl = document.getElementById("grid");
    const backdrop = document.getElementById("backdrop");

    let activeCard = null;
    let cardPlaceholder = null;

    function panelCard(panel) {
      return `
        <article class="card" data-panel="${panel.id}">
          <header class="card-head">
            <h2>${panel.title}</h2>
            <div class="card-head-right">
              <span class="chip">${panel.tag}</span>
              <button class="zoom-trigger" type="button" data-zoom-button aria-label="Expand ${panel.title}" title="Expand view">
                <svg class="icon-expand" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <polyline points="15 3 21 3 21 9" stroke-linecap="round" stroke-linejoin="round"></polyline>
                  <polyline points="9 21 3 21 3 15" stroke-linecap="round" stroke-linejoin="round"></polyline>
                  <line x1="21" y1="3" x2="14" y2="10" stroke-linecap="round"></line>
                  <line x1="3" y1="21" x2="10" y2="14" stroke-linecap="round"></line>
                </svg>
                <svg class="icon-close" viewBox="0 0 24 24" fill="none" aria-hidden="true" style="display:none">
                  <line x1="18" y1="6" x2="6" y2="18" stroke-linecap="round" stroke-linejoin="round"></line>
                  <line x1="6" y1="6" x2="18" y2="18" stroke-linecap="round" stroke-linejoin="round"></line>
                </svg>
              </button>
            </div>
          </header>
          <div class="panel">
            <iframe
              data-file="${panel.file}"
              src="${panel.file}"
              loading="eager"
              title="${panel.title}"
              referrerpolicy="no-referrer"
            ></iframe>
            <div class="overlay" data-overlay>
              <div>
                <p class="msg-title">Loading panel...</p>
                <p class="msg-body">Attempting to load <code>${panel.file}</code>.</p>
              </div>
            </div>
          </div>
        </article>
      `;
    }

    function refreshStatus() {
      const overlays = Array.from(document.querySelectorAll("[data-overlay]"));
      const visibleOverlays = overlays.filter((el) => !el.classList.contains("hide")).length;
      if (visibleOverlays === 0) {
        statusEl.textContent = `All panels loaded - ${new Date().toLocaleTimeString()}`;
        return;
      }
      statusEl.textContent = `${panels.length - visibleOverlays}/${panels.length} panels loaded`;
    }

    function attachLoadHandlers() {
      const cards = Array.from(gridEl.querySelectorAll("article.card"));
      cards.forEach((card) => {
        const frame = card.querySelector("iframe");
        const overlay = card.querySelector("[data-overlay]");
        const fileName = frame.getAttribute("data-file");

        const timeoutId = setTimeout(() => {
          if (!overlay.classList.contains("hide")) {
            overlay.classList.add("error");
            overlay.innerHTML = `
              <div>
                <p class="msg-title">Still waiting for file</p>
                <p class="msg-body">Could not confirm <code>${fileName}</code>. Run <code>dndonto-viz</code> and reload.</p>
              </div>
            `;
            refreshStatus();
          }
        }, 3200);

        frame.addEventListener("load", () => {
          clearTimeout(timeoutId);
          overlay.classList.remove("error");
          overlay.classList.add("hide");
          refreshStatus();
        });

        frame.addEventListener("error", () => {
          clearTimeout(timeoutId);
          overlay.classList.remove("hide");
          overlay.classList.add("error");
          overlay.innerHTML = `
            <div>
              <p class="msg-title">Failed to load panel</p>
              <p class="msg-body">Expected file <code>${fileName}</code> in this folder.</p>
            </div>
          `;
          refreshStatus();
        });
      });
    }

    function openZoom(card) {
      if (activeCard) return;
      const rect = card.getBoundingClientRect();

      // Insert a placeholder to hold the card's space in the grid
      cardPlaceholder = document.createElement("div");
      cardPlaceholder.className = "card-placeholder";
      cardPlaceholder.style.height = rect.height + "px";
      card.parentNode.insertBefore(cardPlaceholder, card);

      // Pin the card at its current on-screen position, then animate to fullscreen
      card.style.top = rect.top + "px";
      card.style.left = rect.left + "px";
      card.style.width = rect.width + "px";
      card.style.height = rect.height + "px";
      card.classList.add("is-zoomed");

      backdrop.classList.add("visible");
      backdrop.setAttribute("aria-hidden", "false");

      // Swap to close icon
      const expandIcon = card.querySelector(".icon-expand");
      const closeIcon = card.querySelector(".icon-close");
      const btn = card.querySelector(".zoom-trigger");
      if (expandIcon) expandIcon.style.display = "none";
      if (closeIcon) closeIcon.style.display = "";
      if (btn) btn.setAttribute("aria-label", "Collapse " + card.querySelector("h2").textContent);

      // Force reflow so the browser registers the start position before we transition
      card.offsetHeight;

      // Animate to near-fullscreen
      const pad = 28;
      card.classList.add("zoom-animating");
      card.style.top = pad + "px";
      card.style.left = pad + "px";
      card.style.width = (window.innerWidth - pad * 2) + "px";
      card.style.height = (window.innerHeight - pad * 2) + "px";

      activeCard = card;
    }

    function closeZoom() {
      if (!activeCard) return;
      const card = activeCard;

      backdrop.classList.remove("visible");
      backdrop.setAttribute("aria-hidden", "true");

      // Swap back to expand icon
      const expandIcon = card.querySelector(".icon-expand");
      const closeIcon = card.querySelector(".icon-close");
      const btn = card.querySelector(".zoom-trigger");
      if (expandIcon) expandIcon.style.display = "";
      if (closeIcon) closeIcon.style.display = "none";
      if (btn) btn.setAttribute("aria-label", "Expand " + card.querySelector("h2").textContent);

      // Animate back to the placeholder's current position
      const rect = cardPlaceholder.getBoundingClientRect();
      card.style.top = rect.top + "px";
      card.style.left = rect.left + "px";
      card.style.width = rect.width + "px";
      card.style.height = rect.height + "px";

      // Restore to normal flow once the transition ends
      function onTransitionEnd(e) {
        if (e.propertyName !== "width") return;
        card.removeEventListener("transitionend", onTransitionEnd);
        card.classList.remove("is-zoomed", "zoom-animating");
        card.style.top = "";
        card.style.left = "";
        card.style.width = "";
        card.style.height = "";
        if (cardPlaceholder && cardPlaceholder.parentNode) {
          cardPlaceholder.parentNode.removeChild(cardPlaceholder);
          cardPlaceholder = null;
        }
        activeCard = null;
      }
      card.addEventListener("transitionend", onTransitionEnd);
    }

    function renderGrid() {
      gridEl.innerHTML = panels.map(panelCard).join("");
      attachLoadHandlers();
      refreshStatus();
    }

    function reloadAll() {
      const frames = Array.from(gridEl.querySelectorAll("iframe"));
      frames.forEach((frame) => {
        const fileName = frame.getAttribute("data-file");
        const noCache = `?ts=${Date.now()}`;
        frame.src = `${fileName}${noCache}`;
        const overlay = frame.parentElement.querySelector("[data-overlay]");
        overlay.classList.remove("hide", "error");
        overlay.innerHTML = `
          <div>
            <p class="msg-title">Reloading panel...</p>
            <p class="msg-body">Refreshing <code>${fileName}</code>.</p>
          </div>
        `;
      });
      statusEl.textContent = "Reloading all panels...";
    }

    document.getElementById("reload-all").addEventListener("click", reloadAll);

    // Delegate zoom button clicks; toggle zoom on the owning card
    gridEl.addEventListener("click", (event) => {
      const zoomButton = event.target.closest("[data-zoom-button]");
      if (!zoomButton) return;
      const card = zoomButton.closest(".card");
      if (!card) return;
      if (activeCard === card) {
        closeZoom();
      } else {
        openZoom(card);
      }
    });

    backdrop.addEventListener("click", closeZoom);

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeZoom();
      }
    });

    renderGrid();
  </script>
</body>
</html>
