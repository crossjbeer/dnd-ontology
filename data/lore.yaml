# This data was created by ChatGPT based on plain-text lore from my homebrew DND World and minimal prompting. 
# The goal was to create a small, formatted, sample dataset that exercises the classes and properties defined in the D&D World Ontology. 
# It demonstrates the out of the box potential of these LLMs to generate structured data based on abstract plaintext. 
# It also demonstrates some important caveats / drawbacks of using LLMs for structured data generation, which I mention below as they appear. 

# lore.yaml
# Minimal sample data to ingest into the D&D World Ontology entities/properties.
# Designed to exercise most of the classes defined in the ontology (Location/Region/City/Dungeon, Faction/AdventuringParty,
# Character/NPC/PlayerCharacter, Item/Artifact, Quest, Species, ClassRole).

Species:
  elf:
    type: "Species"
    hasName: "Elf"
  dwarf:
    type: "Species"
    hasName: "Dwarf"

ClassRole:
  sorcerer:
    type: "ClassRole"
    hasName: "Sorcerer"
  fighter:
    type: "ClassRole"
    hasName: "Fighter"

# -----------------------------
# LOCATIONS
# -----------------------------
Location:
  revolis:
    type: "World"
    hasName: "Revolis"
  eversland:
    type: "Continent"
    hasName: "Eversland"
    partOf: "revolis"

  stonegate_province:
    type: "Region"
    hasName: "Province of Stonegate"
    partOf: "eversland"

  glittering_hills:
    type: "Region"
    hasName: "The Glittering Hills"
    partOf: "stonegate_province"

  gemtide_sea:
    type: "Region"
    hasName: "The Gemtide Sea"
    partOf: "stonegate_province"

  emeraldleaf_woods:
    type: "Region"
    hasName: "The Emeraldleaf Woods"
    partOf: "stonegate_province"

  # ChatGPT originally set the swamp's type as 'Dungeon', but based on the lore provided, it should be a Region. 
  # This demonstrates the importance of prompt specificity and human curation of LLM-generated data. 
  swallowed_swamp: 
    type: "Region"
    hasName: "The Swallowed Swamp"
    partOf: "stonegate_province"

  last_try_obelisk:
    type: "Dungeon"
    hasName: "Eth zaz yfraun (The Last Try)"
    locatedIn: "swallowed_swamp"

  # Cities along Moradin's Sprue
  stonegate_city:
    type: "City"
    hasName: "Stonegate"
    partOf: "stonegate_province"

  berronars_bosom:
    type: "City"
    hasName: "Berronar’s Bosom"
    partOf: "stonegate_province"

  marthammor:
    type: "City"
    hasName: "Marthammor"
    partOf: "stonegate_province"

  timberhold:
    type: "City"
    hasName: "Timberhold"
    partOf: "stonegate_province"
    locatedIn: "emeraldleaf_woods"

  rockwell:
    type: "City"
    hasName: "Rockwell"
    partOf: "stonegate_province"
    locatedIn: "glittering_hills"

# -----------------------------
# FACTIONS
# -----------------------------
Faction:
  dwarves_of_stonegate:
    type: "Faction"
    hasName: "Dwarves of Stonegate"
    locatedIn: "stonegate_province"

# ChatGPT hallucinated this faction name. The lore mentions a group of Duergar in the Glittering Hills, but never explicitly names them.
  duergarian_holdfasts:
    type: "Faction"
    hasName: "Duergarian Holdfasts"
    locatedIn: "glittering_hills"
    enemyOf:
      - "dwarves_of_stonegate"

AdventuringParty:
  the_wisps:
    type: "AdventuringParty"
    hasName: "The Wisps"
    locatedIn: "stonegate_province"
    allyOf:
      - "dwarves_of_stonegate"

# -----------------------------
# CHARACTERS
# -----------------------------
NPC:
  lord_nethergloom:
    type: "NPC"
    hasName: "Lord Nethergloom"
    hasAlignment: "Neutral Evil"
    hasCR: 14.0
    locatedIn: "swallowed_swamp"
    enemyOf: # ChatGPT originally set this property as 'enemyOfFactions' which does not exist.
      - "dwarves_of_stonegate"

  lirien_meadowkin:
    type: "NPC"
    hasName: "Lirien Meadowkin"
    hasAlignment: "Chaotic Good"
    locatedIn: "stonegate_province"
    memberOf: "the_wisps"
    hasClass: "sorcerer"

  sir_grum_duergarian: 
    type: "NPC"
    hasName: "Sir Grum Duergarian"
    hasAlignment: "Lawful Neutral"
    locatedIn: "glittering_hills"
    memberOf: "duergarian_holdfasts"

# ChatGPT hallucinated this PlayerCharacter. There is no mention of a specific PC in the lore.
# The LLM likely did this to demonstrate all classes defined in the ontology. 
PlayerCharacter:
  bromli_ironleaf:
    type: "PlayerCharacter"
    hasName: "Bromli Ironleaf"
    hasAlignment: "Neutral Good"
    hasLevel: 1
    locatedIn: "stonegate_city"
    hasSpecies: "dwarf"
    hasClass: "fighter"

# -----------------------------
# ITEMS
# -----------------------------
Artifact:
  moradins_forge_lamp:
    type: "Artifact"
    hasName: "Moradin’s Forge Lamp"
    locatedIn: "berronars_bosom"

# -----------------------------
# QUESTS
# -----------------------------
Quest:
  reclaim_the_swallowed_swamp:
    type: "Quest"
    hasName: "Reclaim the Swallowed Swamp"
    questGiver: "dwarves_of_stonegate"
    targetsLocation: "swallowed_swamp"
    rewardsItem: "moradins_forge_lamp"

  investigate_eth_zaz_yfraun:
    type: "Quest"
    hasName: "Investigate Eth zaz yfraun"
    questGiver: "the_wisps"
    targetsLocation: "last_try_obelisk"
    requiresItem: "moradins_forge_lamp"